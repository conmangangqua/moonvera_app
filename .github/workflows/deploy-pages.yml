name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps.json'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

      - name: Notify Error (Optional)
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        run: |
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            --arg actor "${{ github.actor }}" \
            --arg ref "${{ github.ref_name }}" \
            '{
              content: ("❌ Deploy GitHub Pages failed: *\($repo)*\\nCommit: \($sha)\\nAuthor: \($actor)\\nBranch: \($ref)")
            }')
          
          curl -sS -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$payload" | cat
